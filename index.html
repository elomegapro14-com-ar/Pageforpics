<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Selfie Light App - Guardar Foto</title>
    <meta name="theme-color" id="themeMeta" content="#cbeeff">
    <style>
        html { background-color: #cbeeff; transition: background-color 0.2s; height: -webkit-fill-available; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body {
            width: 100vw; height: 100dvh; overflow: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; background-color: #cbeeff; transition: background-color 0.2s;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
        }
        .camera-container { width: 85%; max-width: 320px; aspect-ratio: 3 / 4; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2); background-color: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .capture-btn { width: 70px; height: 70px; border-radius: 50%; background-color: white; border: 5px solid rgba(255, 255, 255, 0.4); cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: transform 0.1s; }
        .capture-btn:active { transform: scale(0.9); }
        .bottom-panel { width: 100%; max-width: 420px; background-color: rgba(25, 27, 31, 0.88); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 24px; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); z-index: 10; }
        .panel-menu { display: flex; justify-content: space-around; color: rgba(255, 255, 255, 0.5); font-size: 13px; font-weight: 600; }
        .menu-item.active { color: white; border-bottom: 2px solid white; padding-bottom: 2px; }
        .color-carousel { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0; scrollbar-width: none; }
        .color-carousel::-webkit-scrollbar { display: none; }
        .color-option { width: 46px; height: 46px; border-radius: 12px; cursor: pointer; flex-shrink: 0; border: 2px solid transparent; transition: transform 0.2s; }
        .color-option.active { border: 2px solid white; transform: scale(1.08); }
        .color-picker-wrapper { position: relative; width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(45deg, red, yellow, green, cyan, blue, magenta, red); overflow: hidden; flex-shrink: 0; border: 2px solid transparent; }
        .color-picker-wrapper.active { border: 2px solid white; }
        .color-picker-wrapper input[type="color"] { position: absolute; top: -10px; left: -10px; width: 70px; height: 70px; cursor: pointer; opacity: 0; }
        
        /* Lienzo oculto necesario para procesar la foto y descargarla */
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="camera-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div>
        <button class="capture-btn" id="snap"></button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="bottom-panel">
        <div class="panel-menu">
            <span class="menu-item active">● Vibe</span>
            <span class="menu-item">♡ Luz</span>
            <span class="menu-item">✦ Filtro</span>
        </div>
        <div class="color-carousel">
            <div class="color-picker-wrapper" id="pickerWrapper">
                <input type="color" id="customColorPicker" value="#cbeeff">
            </div>
            <div class="color-option" style="background-color: #00bfff;" onclick="changeColor('#00bfff', this)"></div>
            <div class="color-option active" style="background-color: #cbeeff;" onclick="changeColor('#cbeeff', this)"></div>
            <div class="color-option" style="background-color: #e6bcf0;" onclick="changeColor('#e6bcf0', this)"></div>
            <div class="color-option" style="background-color: #df00ff;" onclick="changeColor('#df00ff', this)"></div>
            <div class="color-option" style="background-color: #3b00db;" onclick="changeColor('#3b00db', this)"></div>
            <div class="color-option" style="background-color: #ffb6c1;" onclick="changeColor('#ffb6c1', this)"></div>
            <div class="color-option" style="background-color: #ffffff;" onclick="changeColor('#ffffff', this)"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const customColorPicker = document.getElementById('customColorPicker');
        const pickerWrapper = document.getElementById('pickerWrapper');
        const themeMeta = document.getElementById('themeMeta');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error al iniciar cámara. Recuerda usar un servidor local (localhost):", err);
            }
        }

        function changeColor(color, element) {
            document.documentElement.style.backgroundColor = color;
            document.body.style.backgroundColor = color;
            themeMeta.setAttribute('content', color);
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('active'));
            pickerWrapper.classList.remove('active');
            if (element) element.classList.add('active'); else pickerWrapper.classList.add('active');
        }

        customColorPicker.addEventListener('input', (e) => { changeColor(e.target.value, null); });

        // Función para disparar, hacer el flash y descargar la foto directamente
        document.getElementById('snap').addEventListener('click', () => {
            // 1. Efecto Flash de luz blanca rápida
            const currentBg = document.body.style.backgroundColor;
            changeColor('#ffffff', null);

            // 2. Capturar el fotograma del video en el Canvas
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Dibujar en espejo para que la foto guardada coincida con lo que ves en pantalla
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 3. Crear un enlace de descarga automático
            const dataUrl = canvas.toDataURL('image/jpeg');
            const link = document.createElement('a');
            link.download = `selfie_${Date.now()}.jpg`; // Nombre del archivo
            link.href = dataUrl;
            link.click(); // Forzar la descarga en la galería/carpeta de descargas

            // Restaurar color de iluminación tras el flash
            setTimeout(() => { changeColor(currentBg, null); }, 120);
        });

        initCamera();
    </script>
</body>
</html>
